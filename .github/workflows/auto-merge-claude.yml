name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"

          # Create PR (ignores error if already exists)
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Auto: $BRANCH" \
            --body "Merge automático de \`$BRANCH\` → \`master\` via GitHub Actions." \
            || true

          # Enable auto-merge
          gh pr merge "$BRANCH" \
            --merge \
            --auto \
            --delete-branch \
            || true
